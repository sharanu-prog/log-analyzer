<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Analyzer - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #e94560; font-size: 28px; }
        .logo p { color: #aaa; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { color: #ccc; font-size: 14px; display: block; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #e94560; }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e94560, #c62a47);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .error {
            background: rgba(233,69,96,0.2);
            border: 1px solid #e94560;
            color: #e94560;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
        .register-link a { color: #e94560; text-decoration: none; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <h1>🔍 Log Analyzer</h1>
        <p>System Failure Pattern Detection</p>
    </div>
    <div class="error" id="errorMsg"></div>
    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username"/>
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password"/>
    </div>
    <button class="btn" onclick="login()">Login</button>
    <div class="register-link">
        Don't have an account? <a href="register.html">Register</a>
    </div>
</div>

<script>
    const API = 'http://localhost:8080';

    // If already logged in, go to dashboard
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if (!username || !password) {
            showError('Please enter username and password!');
            return;
        }

        try {
            const response = await fetch(`${API}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                const data = await response.json();
                // Save token to localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                // Go to dashboard
                window.location.href = 'dashboard.html';
            } else {
                showError('Invalid username or password!');
            }
        } catch (err) {
            showError('Cannot connect to server. Is it running?');
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }

    // Allow Enter key to login
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
