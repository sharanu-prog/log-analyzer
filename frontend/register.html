<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Analyzer - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #e94560; font-size: 28px; }
        .logo p { color: #aaa; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { color: #ccc; font-size: 14px; display: block; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #e94560; }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e94560, #c62a47);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .msg {
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .success { background: rgba(0,200,100,0.2); border: 1px solid #00c864; color: #00c864; }
        .error { background: rgba(233,69,96,0.2); border: 1px solid #e94560; color: #e94560; }
        .login-link { text-align: center; margin-top: 20px; color: #aaa; font-size: 14px; }
        .login-link a { color: #e94560; text-decoration: none; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">
        <h1>🔍 Log Analyzer</h1>
        <p>Create your account</p>
    </div>
    <div class="msg" id="msg"></div>
    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username"/>
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email"/>
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Choose a password"/>
    </div>
    <button class="btn" onclick="register()">Register</button>
    <div class="login-link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>
<script>
    const API = 'http://localhost:8080';

    async function register() {
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (response.ok) {
                showMsg('Registered successfully! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                const text = await response.text();
                showMsg(text || 'Registration failed!', 'error');
            }
        } catch (err) {
            showMsg('Cannot connect to server!', 'error');
        }
    }

    function showMsg(msg, type) {
        const el = document.getElementById('msg');
        el.textContent = msg;
        el.className = `msg ${type}`;
        el.style.display = 'block';
    }
</script>
</body>
</html>
